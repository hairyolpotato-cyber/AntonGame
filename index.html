<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Кулак в Антона | English Test</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #2b2e4a 0%, #1a1c2c 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            padding: 16px;
        }

        .game-box {
            max-width: 550px;
            width: 100%;
            background: #fff2df;
            border-radius: 72px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            padding: 24px 20px 32px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: #2e241f;
            padding: 12px 20px;
            border-radius: 60px;
            color: #ffebc2;
            font-weight: bold;
            margin-bottom: 25px;
            font-size: 0.7rem;
            flex-wrap: wrap;
            gap: 8px;
        }

        .anton-stage {
            position: relative;
            margin-bottom: 20px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .anton-face {
            background: radial-gradient(circle at 35% 35%, #f5cd94, #e0a86a);
            border-radius: 50%;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
            aspect-ratio: 1 / 1;
            position: relative;
            box-shadow: 0 12px 25px rgba(0,0,0,0.3), inset 0 2px 5px rgba(255,255,200,0.6);
            border: 3px solid #b87a3a;
            transition: transform 0.08s linear;
            overflow: visible;
        }

        .eyebrows {
            position: absolute;
            top: 22%;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 18%;
            z-index: 3;
        }
        .brow {
            width: 45px;
            height: 14px;
            background: #4a2e1e;
            border-radius: 20px;
            transition: 0.15s;
        }
        .brow.sad { transform: rotate(-5deg) translateY(4px); }

        .eyes {
            position: absolute;
            top: 38%;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 3;
        }
        .eye {
            width: 48px;
            height: 48px;
            background: #fef7e0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 3px #7a4a2a, 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
        }
        .pupil {
            width: 24px;
            height: 24px;
            background: #2b2b2b;
            border-radius: 50%;
            position: relative;
        }
        .pupil::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            top: 4px;
            left: 4px;
        }

        .nose {
            position: absolute;
            top: 52%;
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 24px;
            background: #c9864a;
            border-radius: 50% 50% 45% 45%;
            box-shadow: inset -2px -2px 0 #a5632e;
            z-index: 3;
        }

        /* РОТ — зубы ПОЛНОСТЬЮ ВНУТРИ */
        .mouth-container {
            position: absolute;
            bottom: 14%;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 4;
        }
        .mouth {
            width: 120px;
            height: 55px;
            background: #2a0500;
            border-radius: 0 0 55px 55px;
            position: relative;
            transition: 0.1s;
            overflow: hidden;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
        }
        .mouth.sad {
            border-radius: 55px 55px 0 0;
        }
        
        /* Верхние зубы — внутри рта, прижаты к верхнему краю */
        .teeth-upper {
            position: absolute;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 3px;
            justify-content: center;
            width: 90%;
            z-index: 5;
        }
        /* Нижние зубы — внутри рта, прижаты к нижнему краю */
        .teeth-lower {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 3px;
            justify-content: center;
            width: 90%;
            z-index: 5;
        }
        .tooth {
            width: 11px;
            height: 13px;
            background: #fff5e0;
            border-radius: 2px 2px 4px 4px;
            border: 1px solid #c9a06c;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .tooth.missing {
            background: #4a1a08;
            border: 1px solid #2a0a00;
            opacity: 0.6;
        }

        .bruise {
            position: absolute;
            width: 28px;
            height: 28px;
            background: radial-gradient(circle, #7a3a8a, #3a0a3a);
            border-radius: 50%;
            opacity: 0.75;
            filter: blur(3px);
            z-index: 2;
            animation: bruiseFade 0.3s ease-out;
        }
        @keyframes bruiseFade {
            0% { transform: scale(0.2); opacity: 0; }
            100% { transform: scale(1); opacity: 0.75; }
        }

        .fist-punch {
            position: absolute;
            bottom: -20px;
            right: -20px;
            width: 90px;
            height: 90px;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            transform: translate(50px, 50px) scale(0.8);
            transition: all 0.4s cubic-bezier(0.34, 1.2, 0.55, 1);
        }
        .fist-punch.active {
            opacity: 1;
            transform: translate(-100px, -140px) scale(1.15) rotate(15deg);
        }
        .fist-icon {
            font-size: 68px;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.4));
        }

        .splat-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
        }
        .splash-particle {
            position: absolute;
            width: 18px;
            height: 18px;
            background: radial-gradient(circle, #e34d2b, #8a1a0a);
            border-radius: 60% 40% 70% 30%;
            animation: splatter 0.55s ease-out forwards;
        }
        @keyframes splatter {
            0% { transform: scale(0.2) translate(0, 0); opacity: 1; }
            100% { transform: scale(1.4) translate(var(--dx), var(--dy)); opacity: 0; }
        }

        .question-card {
            background: #fef3e2;
            border-radius: 48px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: inset 0 1px 4px #0001, 0 8px 12px rgba(0,0,0,0.1);
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            margin: 12px 0;
            color: #2c1b12;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 18px 0;
        }
        .answer-btn {
            background: #d9c2a7;
            border: none;
            padding: 14px 16px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            font-family: inherit;
            cursor: pointer;
            color: #2d241c;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.07s linear;
        }
        .answer-btn:active { transform: scale(0.97); background: #c2a67e; }
        .reset-btn {
            background: #57546b;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
            color: white;
        }
        .tap-hint {
            text-align: center;
            margin: 12px 0 8px;
            font-size: 1rem;
            background: #ffdd99;
            display: inline-block;
            width: auto;
            padding: 6px 18px;
            border-radius: 40px;
            color: #6b3a1a;
            font-weight: bold;
        }
        .info-message {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 16px;
            color: #854c30;
        }
        button { touch-action: manipulation; }

        @keyframes tearFall {
            0% { transform: translateY(-10px); opacity: 0; }
            40% { transform: translateY(5px); opacity: 1; }
            100% { transform: translateY(30px); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="game-box">
    <div class="stats">
        <span>👊 Бросков: <span id="throwCount">0</span></span>
        <span>❌ Ошибок: <span id="errorCount">0</span> / 3</span>
        <span>📋 Пройдено: <span id="progressQ">0</span> / 20</span>
        <span>🦷 Зубов: <span id="teethLeft">16</span></span>
        <span>💢 Синяков: <span id="bruiseCount">0</span></span>
    </div>

    <div style="text-align: center;">
        <span class="tap-hint">👊 ТАПНИ НА ЛИЦО → УДАР КУЛАКОМ 👊</span>
    </div>

    <div class="anton-stage" id="antonStage">
        <div class="anton-face" id="antonFace">
            <div class="eyebrows" id="brows">
                <div class="brow" id="leftBrow"></div>
                <div class="brow" id="rightBrow"></div>
            </div>
            <div class="eyes">
                <div class="eye"><div class="pupil"></div></div>
                <div class="eye"><div class="pupil"></div></div>
            </div>
            <div class="nose"></div>
            <div class="mouth-container">
                <div class="mouth" id="antonMouth">
                    <div class="teeth-upper" id="teethUpper"></div>
                    <div class="teeth-lower" id="teethLower"></div>
                </div>
            </div>
            <div id="bruisesContainer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2;"></div>
            <div id="tearsZone" style="position: absolute; top: 45%; left: 0; right: 0; pointer-events: none; z-index: 5;"></div>
        </div>
        <div class="fist-punch" id="fistPunch">
            <div class="fist-icon">👊💥</div>
        </div>
    </div>

    <div id="quizArea" style="display: none;">
        <div class="question-card">
            <div class="question-text" id="questionText">Загрузка...</div>
            <div class="answers" id="answersContainer"></div>
            <div id="explanationText" style="margin-top: 16px; padding: 12px; background: #e8d9c8; border-radius: 28px; font-size: 0.8rem; color: #3a2a1a; display: none;"></div>
        </div>
    </div>

    <button class="reset-btn" id="resetGameBtn">🔄 НАЧАТЬ ЗАНОВО</button>
    <div class="info-message">👉 Верный ответ → выбивается зуб + новый синяк. 3 ошибки → перезапуск.</div>
</div>

<script>
    const QUESTIONS = [
        { text: "What ___ your name?", options: ["is", "am", "are"], correct: 0, explanation: "✅ Правильно: is. ❌ am — только для I, are — для you/we/they." },
        { text: "She ___ to school every day.", options: ["go", "goes", "going"], correct: 1, explanation: "✅ Правильно: goes. Every day → Present Simple. Для she нужен goes." },
        { text: "I ___ play football when I was 7.", options: ["can", "could", "should"], correct: 1, explanation: "✅ Правильно: could. When I was 7 — прошлое. Could — прошедшая форма can." },
        { text: "They ___ watching TV at 8 pm yesterday.", options: ["was", "were", "are"], correct: 1, explanation: "✅ Правильно: were. At 8 pm yesterday → Past Continuous. They → were." },
        { text: "If it rains tomorrow, we ___ stay home.", options: ["will", "would", "may"], correct: 0, explanation: "✅ Правильно: will. Условное 1 типа: If + Present Simple, will + инфинитив." },
        { text: "This is the book ___ I told you about.", options: ["who", "which", "what"], correct: 1, explanation: "✅ Правильно: which. Which для предметов, who для людей." },
        { text: "She has ___ to the supermarket.", options: ["go", "went", "gone"], correct: 2, explanation: "✅ Правильно: gone. Present Perfect: has + третья форма (gone)." },
        { text: "You ___ smoke here. It's forbidden.", options: ["mustn't", "don't have to", "couldn't"], correct: 0, explanation: "✅ Правильно: mustn't. Forbidden = запрещено → must not." },
        { text: "I'm looking forward ___ you.", options: ["to see", "seeing", "to seeing"], correct: 2, explanation: "✅ Правильно: to seeing. Look forward to — предлог to, после него герундий." },
        { text: "He drives ___ fast.", options: ["too", "very", "much"], correct: 0, explanation: "✅ Правильно: too. Too fast = слишком быстро." },
        { text: "By 2030, we ___ more electric cars.", options: ["will have", "have", "will having"], correct: 0, explanation: "✅ Правильно: will have. By 2030 → Future Perfect." },
        { text: "If I were you, I ___ that.", options: ["won't do", "wouldn't do", "don't do"], correct: 1, explanation: "✅ Правильно: wouldn't do. Условное 2 типа: would + инфинитив." },
        { text: "Let me ___ you with your bag.", options: ["help", "to help", "helping"], correct: 0, explanation: "✅ Правильно: help. После let me — инфинитив без to." },
        { text: "This is the most ___ movie ever.", options: ["bored", "boring", "bore"], correct: 1, explanation: "✅ Правильно: boring. Boring = скучный (о фильме)." },
        { text: "She advised me ___ earlier.", options: ["to arrive", "arrive", "arriving"], correct: 0, explanation: "✅ Правильно: to arrive. Advise требует инфинитив с to." },
        { text: "Neither Tom nor Jerry ___ hungry.", options: ["is", "are", "am"], correct: 0, explanation: "✅ Правильно: is. Глагол по последнему подлежащему (Jerry → is)." },
        { text: "You ___ be tired after the long journey.", options: ["can", "must", "should"], correct: 1, explanation: "✅ Правильно: must. Must be = должно быть (предположение)." },
        { text: "I wish I ___ more time.", options: ["have", "had", "would have"], correct: 1, explanation: "✅ Правильно: had. I wish о настоящем → Past Simple." },
        { text: "The report ___ finished by Friday.", options: ["must be", "must have", "must"], correct: 0, explanation: "✅ Правильно: must be. Пассивный залог: must be + V3." },
        { text: "She enjoys ___ to podcasts.", options: ["listen", "listening", "to listen"], correct: 1, explanation: "✅ Правильно: listening. После enjoy — герундий (-ing)." }
    ];

    function shuffleOptions(q) {
        const shuffled = [...q.options];
        const correctText = q.options[q.correct];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return { shuffledOptions: shuffled, correctPos: shuffled.indexOf(correctText) };
    }

    let currentQuestionIndex = 0, errorCount = 0, throwCount = 0;
    let teethCount = 16;
    let bruiseCount = 0;
    let gameActive = true, waitingForAnswer = false;
    let currentQ = null, currentShuffled = null, currentCorrectPos = -1;

    const throwSpan = document.getElementById('throwCount');
    const errorSpan = document.getElementById('errorCount');
    const progressSpan = document.getElementById('progressQ');
    const teethLeftSpan = document.getElementById('teethLeft');
    const bruiseCountSpan = document.getElementById('bruiseCount');
    const quizArea = document.getElementById('quizArea');
    const questionText = document.getElementById('questionText');
    const answersDiv = document.getElementById('answersContainer');
    const explanationDiv = document.getElementById('explanationText');
    const resetBtn = document.getElementById('resetGameBtn');
    const antonStage = document.getElementById('antonStage');
    const antonFace = document.getElementById('antonFace');
    const leftBrow = document.getElementById('leftBrow');
    const rightBrow = document.getElementById('rightBrow');
    const antonMouth = document.getElementById('antonMouth');
    const teethUpper = document.getElementById('teethUpper');
    const teethLower = document.getElementById('teethLower');
    const bruisesContainer = document.getElementById('bruisesContainer');
    const tearsZone = document.getElementById('tearsZone');
    const fistDiv = document.getElementById('fistPunch');

    function updateUI() {
        errorSpan.innerText = errorCount;
        progressSpan.innerText = currentQuestionIndex;
        throwSpan.innerText = throwCount;
        teethLeftSpan.innerText = teethCount;
        bruiseCountSpan.innerText = bruiseCount;
    }

    function renderTeeth() {
        teethUpper.innerHTML = '';
        teethLower.innerHTML = '';
        for (let i = 0; i < 8; i++) {
            const tu = document.createElement('div');
            tu.className = 'tooth' + (i >= Math.min(8, teethCount) ? ' missing' : '');
            teethUpper.appendChild(tu);
        }
        for (let i = 0; i < 8; i++) {
            const tl = document.createElement('div');
            tl.className = 'tooth' + ((i + 8) >= teethCount ? ' missing' : '');
            teethLower.appendChild(tl);
        }
    }

    function removeOneTooth() {
        if (teethCount > 0) {
            teethCount--;
            renderTeeth();
        }
    }

    function addRandomBruise() {
        const bruise = document.createElement('div');
        bruise.className = 'bruise';
        bruise.style.top = (15 + Math.random() * 65) + '%';
        bruise.style.left = (10 + Math.random() * 80) + '%';
        const size = 20 + Math.random() * 20;
        bruise.style.width = size + 'px';
        bruise.style.height = size + 'px';
        bruisesContainer.appendChild(bruise);
        bruiseCount++;
        updateUI();
    }

    function clearBruises() {
        bruisesContainer.innerHTML = '';
        bruiseCount = 0;
    }

    function setFaceNeutral() {
        leftBrow.className = 'brow';
        rightBrow.className = 'brow';
        antonMouth.className = 'mouth';
    }
    function setFaceSad() {
        leftBrow.className = 'brow sad';
        rightBrow.className = 'brow sad';
        antonMouth.className = 'mouth sad';
    }
    function clearTears() { tearsZone.innerHTML = ''; }
    function showTears() {
        clearTears();
        for (let i = 0; i < 8; i++) {
            const tear = document.createElement('div');
            tear.style.position = 'absolute';
            tear.style.width = '10px';
            tear.style.height = '18px';
            tear.style.background = '#6cb2eb';
            tear.style.borderRadius = '50%';
            tear.style.left = (15 + i * 10) + '%';
            tear.style.top = '45%';
            tear.style.animation = 'tearFall 1.2s infinite';
            tear.style.animationDelay = (i * 0.15) + 's';
            tearsZone.appendChild(tear);
        }
    }

    function createSplashes(centerX, centerY) {
        const container = document.createElement('div');
        container.className = 'splat-overlay';
        document.body.appendChild(container);
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'splash-particle';
            const angle = Math.random() * Math.PI * 2;
            const dist = 35 + Math.random() * 110;
            p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
            p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
            p.style.left = (centerX - 10 + (Math.random() - 0.5) * 60) + 'px';
            p.style.top = (centerY - 10 + (Math.random() - 0.5) * 60) + 'px';
            container.appendChild(p);
        }
        setTimeout(() => container.remove(), 700);
    }

    function animateFist() {
        fistDiv.classList.remove('active');
        void fistDiv.offsetWidth;
        fistDiv.classList.add('active');
        setTimeout(() => fistDiv.classList.remove('active'), 450);
    }

    function punchAnton() {
        if (!gameActive) { alert("Игра закончена. Нажми «Начать заново»"); return; }
        if (waitingForAnswer) { alert("Сначала ответь на вопрос!"); return; }

        const rect = antonFace.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        animateFist();
        antonFace.style.transform = 'scale(0.96)';
        setTimeout(() => antonFace.style.transform = '', 160);
        setTimeout(() => createSplashes(centerX, centerY), 180);
        setTimeout(() => { setFaceSad(); setTimeout(() => setFaceNeutral(), 350); }, 180);

        throwCount++;
        updateUI();

        if (gameActive && currentQuestionIndex < 20) {
            loadCurrentQuestion();
        } else if (currentQuestionIndex >= 20) {
            winGame();
        }
    }

    function loadCurrentQuestion() {
        if (!gameActive) return;
        if (currentQuestionIndex >= 20) { winGame(); return; }
        const q = QUESTIONS[currentQuestionIndex];
        const { shuffledOptions, correctPos } = shuffleOptions(q);
        currentQ = q;
        currentShuffled = shuffledOptions;
        currentCorrectPos = correctPos;

        questionText.innerText = currentQ.text;
        answersDiv.innerHTML = '';
        for (let i = 0; i < currentShuffled.length; i++) {
            const btn = document.createElement('button');
            btn.className = 'answer-btn';
            btn.innerText = currentShuffled[i];
            btn.onclick = () => handleAnswer(i);
            answersDiv.appendChild(btn);
        }
        explanationDiv.style.display = 'none';
        quizArea.style.display = 'block';
        waitingForAnswer = true;
    }

    function handleAnswer(selected) {
        if (!gameActive || !waitingForAnswer) return;
        const isCorrect = (selected === currentCorrectPos);
        
        explanationDiv.innerText = currentQ.explanation;
        explanationDiv.style.display = 'block';
        
        if (!isCorrect) {
            errorCount++;
            updateUI();
            setFaceSad();
            setTimeout(() => setFaceNeutral(), 800);
            if (errorCount >= 3) {
                setTimeout(() => loseGame(), 1000);
                return;
            }
            setTimeout(() => {
                quizArea.style.display = 'none';
                waitingForAnswer = false;
            }, 1500);
            return;
        }
        
        if (teethCount > 0) removeOneTooth();
        addRandomBruise();
        updateUI();
        
        currentQuestionIndex++;
        updateUI();
        
        setTimeout(() => {
            quizArea.style.display = 'none';
            waitingForAnswer = false;
            if (currentQuestionIndex >= 20) {
                winGame();
            }
        }, 1500);
    }

    function winGame() {
        gameActive = false;
        waitingForAnswer = false;
        quizArea.style.display = 'none';
        setFaceSad();
        showTears();
        alert("😭 АНТОН ПЛАЧЕТ! 😭\nБез зубов, весь в синяках, но ты прошёл 20 вопросов!");
    }

    function loseGame() {
        gameActive = false;
        waitingForAnswer = false;
        quizArea.style.display = 'none';
        alert("❌ 3 ОШИБКИ! ИГРА НАЧИНАЕТСЯ ЗАНОВО ❌");
        fullReset();
    }

    function fullReset() {
        currentQuestionIndex = 0;
        errorCount = 0;
        throwCount = 0;
        teethCount = 16;
        bruiseCount = 0;
        gameActive = true;
        waitingForAnswer = false;
        quizArea.style.display = 'none';
        setFaceNeutral();
        clearTears();
        clearBruises();
        renderTeeth();
        updateUI();
    }

    antonStage.addEventListener('click', (e) => {
        e.stopPropagation();
        punchAnton();
    });

    resetBtn.addEventListener('click', () => {
        fullReset();
        alert("Игра перезапущена! Тапай на лицо Антона.");
    });

    fullReset();
    renderTeeth();
</script>
</body>
</html>
